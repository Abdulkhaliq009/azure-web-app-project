trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  nodeVersion: '18.x'

stages:

- stage: Build
  displayName: 'Build & Test'
  jobs:
  - job: BuildJob
    steps:
    - task: NodeTool@1
      inputs:
        versionSpec: '$(nodeVersion)'
      displayName: 'Install Node.js'

    - script: npm install
      displayName: 'Install dependencies'

    - script: npm test --if-present
      displayName: 'Run tests'

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
        replaceExistingArchive: true

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'webapp-drop'

- stage: Test
  displayName: 'Smoke Tests'
  dependsOn: Build
  jobs:
  - job: SmokeTest
    steps:
    - script: |
        echo "Running smoke tests..."
        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://webapp-3tier-demo-hwhnbjf3a8d5hgf3.swedencentral-01.azurewebsites.net/health)
        if [ "$RESPONSE" == "200" ]; then
          echo "✅ Health check passed"
        else
          echo "⚠️ Health check returned HTTP $RESPONSE - continuing anyway"
        fi
      displayName: 'Run health check'

- stage: Deploy
  displayName: 'Deploy to Azure'
  dependsOn: Test
  jobs:
  - deployment: DeployJob
    environment: 'Production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'azure-subscription-connection'
              appType: 'webAppLinux'
              appName: 'webapp-3tier-demo'
              package: '$(Pipeline.Workspace)/webapp-drop/*.zip'